# Docker Swarm deployment configuration — external database (no containerized PostgreSQL)
#
# Usage:
#   make start-swarm-nodb ENV_FILE=.env.DEV_SWARM
#
# Same as docker-compose.swarm.yml but without the db service.
# Set POSTGRES_HOST, POSTGRES_PORT, etc. in your env file to point to the external DB.

services:

    frontend:
        image: ${REGISTRY}/validationsvc-frontend
        ports:
            - 80:80
            - 443:443
        environment:
            CERTBOT_DOMAIN: ${CERTBOT_DOMAIN}
            CERTBOT_EMAIL: ${CERTBOT_EMAIL}
        volumes:
            - letsencrypt_data:/etc/letsencrypt
            - static_data:/app/backend/django_static
        networks:
            - validate
        deploy:
            replicas: 1
            placement:
                constraints: [node.role == manager]
            restart_policy:
                condition: on-failure
                delay: 5s

    backend:
        image: ${REGISTRY}/validationsvc-backend
        entrypoint: /app/backend/server-entrypoint.sh
        env_file: ${ENV_FILE}
        environment:
            POSTGRES_HOST: pgbouncer
            POSTGRES_PORT: "6432"
        volumes:
            - static_data:/app/backend/django_static
            - files_data:/files_storage
            - gherkin_rules_log_data:/gherkin_logs
        expose:
            - 8000
        networks:
            - validate
        deploy:
            replicas: 1
            placement:
                constraints: [node.role == manager]
            restart_policy:
                condition: on-failure
                delay: 5s
            update_config:
                parallelism: 1
                delay: 30s
                failure_action: rollback
        healthcheck:
            test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/')\""]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    worker:
        image: ${REGISTRY}/validationsvc-backend
        entrypoint: /app/backend/worker-entrypoint.sh
        env_file: ${ENV_FILE}
        environment:
            POSTGRES_HOST: pgbouncer
            POSTGRES_PORT: "6432"
        volumes:
            - files_data:/files_storage
            - gherkin_rules_log_data:/gherkin_logs
        networks:
            - validate
        deploy:
            replicas: 2
            # No placement constraint - workers run on any node
            restart_policy:
                condition: on-failure
                delay: 5s
            update_config:
                parallelism: 1
                delay: 30s
                failure_action: rollback

    scheduler:
        image: ${REGISTRY}/validationsvc-backend
        entrypoint: /app/backend/worker-beat-entrypoint.sh
        env_file: ${ENV_FILE}
        environment:
            POSTGRES_HOST: pgbouncer
            POSTGRES_PORT: "6432"
        volumes:
            - files_data:/files_storage
            - gherkin_rules_log_data:/gherkin_logs
        networks:
            - validate
        deploy:
            replicas: 1
            placement:
                constraints: [node.role == manager]
            restart_policy:
                condition: on-failure
                delay: 5s

    pgbouncer:
        image: edoburu/pgbouncer:v1.24.1-p1
        environment:
            DB_HOST: ${POSTGRES_HOST}
            DB_PORT: ${POSTGRES_PORT}
            DB_USER: ${POSTGRES_USER}
            DB_PASSWORD: ${POSTGRES_PASSWORD}
            DB_NAME: ${POSTGRES_NAME}
            POOL_MODE: transaction
            DEFAULT_POOL_SIZE: "20"
            MAX_CLIENT_CONN: "200"
            SERVER_IDLE_TIMEOUT: "600"
            AUTH_TYPE: scram-sha-256
            LISTEN_PORT: "6432"
        expose:
            - 6432
        networks:
            - validate
        deploy:
            replicas: 1
            placement:
                constraints: [node.role == manager]
            restart_policy:
                condition: on-failure
                delay: 5s

    redis:
        image: redis:8.4-alpine
        command: redis-server --protected-mode no --bind 0.0.0.0
        expose:
            - 6379
        volumes:
            - redis_data:/data
        networks:
            - validate
        deploy:
            replicas: 1
            placement:
                constraints: [node.role == manager]
            restart_policy:
                condition: on-failure
                delay: 5s

networks:
    validate:
        driver: overlay
        driver_opts:
            com.docker.network.driver.mtu: "1400"

volumes:
    static_data:
    letsencrypt_data:
    redis_data:
    files_data:
        driver: local
        driver_opts:
            type: nfs
            o: "addr=${NFS_SERVER_IP},nfsvers=4.1,rw,hard,timeo=600,retrans=2"
            device: ":/srv/nfs/files_data"
    gherkin_rules_log_data:
        driver: local
        driver_opts:
            type: nfs
            o: "addr=${NFS_SERVER_IP},nfsvers=4.1,rw,hard,timeo=600,retrans=2"
            device: ":/srv/nfs/gherkin_logs"
